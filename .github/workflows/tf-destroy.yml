name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: 'AWS region'
        required: false
        default: 'ap-southeast-1'
      confirm:
        description: 'Type "destroy" to confirm'
        required: true

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.7.5"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  # ── Layer 2: EKS cluster (destroy first) ───────────────────────────────────
  destroy-cluster:
    name: Destroy · 2-cluster
    runs-on: ubuntu-latest
    environment: sandbox
    if: ${{ github.event.inputs.confirm == 'destroy' }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_APPLY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || inputs.aws_region }}
          audience: sts.amazonaws.com

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: init
        working-directory: environments/sandbox/2-cluster
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=sandbox/2-cluster/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION || inputs.aws_region }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: destroy
        working-directory: environments/sandbox/2-cluster
        run: terraform destroy -auto-approve
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || inputs.aws_region }}
          TF_VAR_tf_state_bucket: ${{ secrets.TF_STATE_BUCKET }}
          TF_VAR_tf_state_region: ${{ secrets.AWS_REGION || inputs.aws_region }}

  # ── Layer 1: networking + security (destroy after cluster) ─────────────────
  destroy-networking:
    name: Destroy · 1-networking
    runs-on: ubuntu-latest
    needs: destroy-cluster
    environment: sandbox
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_APPLY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || inputs.aws_region }}
          audience: sts.amazonaws.com

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: init
        working-directory: environments/sandbox/1-networking
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=sandbox/1-networking/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION || inputs.aws_region }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: destroy
        working-directory: environments/sandbox/1-networking
        run: terraform destroy -auto-approve
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || inputs.aws_region }}
