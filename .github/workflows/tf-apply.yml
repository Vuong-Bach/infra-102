name: Terraform Apply

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.7.5"

jobs:
  # ── Layer 1: networking + security ─────────────────────────────────────────
  apply-networking:
    name: Apply · 1-networking
    runs-on: ubuntu-latest
    environment: sandbox   # requires manual approval if configured in GitHub
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TF_APPLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: init
        working-directory: environments/sandbox/1-networking
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=sandbox/1-networking/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_LOCK_TABLE }}"

      - name: apply
        working-directory: environments/sandbox/1-networking
        run: terraform apply -auto-approve
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}

  # ── Layer 2: EKS cluster ────────────────────────────────────────────────────
  apply-cluster:
    name: Apply · 2-cluster
    runs-on: ubuntu-latest
    needs: apply-networking
    environment: sandbox
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TF_APPLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: init
        working-directory: environments/sandbox/2-cluster
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=sandbox/2-cluster/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_LOCK_TABLE }}"

      - name: apply
        working-directory: environments/sandbox/2-cluster
        run: terraform apply -auto-approve
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_tf_state_bucket: ${{ vars.TF_STATE_BUCKET }}
          TF_VAR_tf_state_region: ${{ vars.AWS_REGION }}
