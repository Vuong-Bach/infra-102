name: Terraform Plan

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      aws_region:
        description: 'AWS region'
        required: false
        default: 'us-east-1'

permissions:
  id-token: write   # required for OIDC token
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.7.5"

jobs:
  # ── Layer 1: networking + security ─────────────────────────────────────────
  plan-networking:
    name: Plan · 1-networking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.TF_PLAN_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || inputs.aws_region }}
          audience: sts.amazonaws.com

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: fmt check
        working-directory: environments/sandbox/1-networking
        run: terraform fmt -check -recursive

      - name: init
        working-directory: environments/sandbox/1-networking
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=sandbox/1-networking/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION || inputs.aws_region }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: validate
        working-directory: environments/sandbox/1-networking
        run: terraform validate

      - name: plan
        working-directory: environments/sandbox/1-networking
        run: terraform plan -no-color
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || inputs.aws_region }}

  # ── Layer 2: EKS cluster ────────────────────────────────────────────────────
  plan-cluster:
    name: Plan · 2-cluster
    runs-on: ubuntu-latest
    needs: plan-networking
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.TF_PLAN_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || inputs.aws_region }}
          audience: sts.amazonaws.com

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: fmt check
        working-directory: environments/sandbox/2-cluster
        run: terraform fmt -check -recursive

      - name: init
        working-directory: environments/sandbox/2-cluster
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=sandbox/2-cluster/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION || inputs.aws_region }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: validate
        working-directory: environments/sandbox/2-cluster
        run: terraform validate

      - name: plan
        working-directory: environments/sandbox/2-cluster
        run: terraform plan -no-color
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || inputs.aws_region }}
          TF_VAR_tf_state_bucket: ${{ secrets.TF_STATE_BUCKET }}
          TF_VAR_tf_state_region: ${{ secrets.AWS_REGION || inputs.aws_region }}
